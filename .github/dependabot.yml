version: 2
updates:
  # Keeps the Action-Commit-SHAs pinned in workflows up-to-date.
  # Dependabot updates the SHA as well as the "# vX" comment.
  - package-ecosystem: "github-actions"
    # "/" covers .github/workflows; the Glob additionally covers the
    # local composite actions under .github/actions/*.
    directories: ["/", "/.github/actions/*"]
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    # All action updates should be bundled in a single PR:
    groups:
      github-actions:
        patterns:
          - "*"
    # Note: Dependabot reads this file from default branch.
    # If updates should run against an experimental branch, add here:
    #   target-branch: "test-workflows"
