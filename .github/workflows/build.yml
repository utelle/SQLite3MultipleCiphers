name: Build and Package (Manual)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        type: choice
        default: dry-run
        options:
          - sanity
          - dry-run
          - release

env:
  AMALGAMATION: amalgamation
  ARCHIVES:     archives
  SQLITE_PATH:  sqlite3
  LIBICU_PATH:  icu_precompiled

jobs:

  build-windows:
    runs-on: windows-2022
    env:
      MODE: ${{ github.event.inputs.mode }}
#    strategy:
#      fail-fast: false
#      matrix:
#        platform:
#          - win32
#          - win64

    steps:

      # -------------------------------------------------
      # Checkout repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------------------------------------------------
      # Create environment variables
      # -------------------------------------------------
      - name: Build context
        shell: pwsh
        run: |
          python scripts/build_context.py

      # -------------------------------------------------
      # Display environment variables
      # -------------------------------------------------
      - name: Show environment
        shell: pwsh
        run: |
          echo "SQLite Version:      $env:SQLITE_VERSION"
          echo "SQLite Version Raw:  $env:SQLITE_VERSION_RAW"
          echo "SQLite URL Official: $env:SQLITE_URL_OFFICIAL"
          echo "SQLite URL GitHub:   $env:SQLITE_URL_GITHUB"
          echo ""
          echo "ICU Version:         $env:ICU_VERSION"
          echo "ICU URL Win32:       $env:ICU_URL_WIN32"
          echo "ICU URL Win64:       $env:ICU_URL_WIN64"

      # -------------------------------------------------
      # Create directories for intermediate results
      # -------------------------------------------------
      - name: Create working directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ${{ env.SQLITE_PATH }}
          New-Item -ItemType Directory -Force -Path ${{ env.LIBICU_PATH }}
          New-Item -ItemType Directory -Force -Path ${{ env.AMALGAMATION }}
          New-Item -ItemType Directory -Force -Path ${{ env.ARCHIVES }}

      # -------------------------------------------------
      # Download ICU binary releases for Win32 and Win64
      # -------------------------------------------------
      - name: Download source archive
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "${{ env.ICU_URL_WIN32 }}" `
            -OutFile "${{ env.LIBICU_PATH }}/icu-precompiled-win32.zip"
          Invoke-WebRequest `
            -Uri "${{ env.ICU_URL_WIN64 }}" `
            -OutFile "${{ env.LIBICU_PATH }}/icu-precompiled-win64.zip"

      # -------------------------------------------------
      # Extract ICU binaries
      # -------------------------------------------------
      - name: Extract ICU archives
        shell: pwsh
        run: |
          Expand-Archive `
            -Path "${{ env.LIBICU_PATH }}/icu-precompiled-win32.zip" `
            -DestinationPath "${{ env.LIBICU_PATH }}/win32"
          Expand-Archive `
            -Path "${{ env.LIBICU_PATH }}/icu-precompiled-win64.zip" `
            -DestinationPath "${{ env.LIBICU_PATH }}/win64"
          $path = "${{ env.LIBICU_PATH }}/win64"

          if (!(Test-Path "$path/include")) {
            throw "ICU headers missing: $path/include"
          }
          Write-Host "ICU extraction OK"
          python --version

