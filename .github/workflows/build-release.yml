name: Build and Release (Manual)

# Notes:
# - All release artifact names must start with "sqlite3mc-".
#   Intermediate or temporary artifacts must not use this prefix.
# - The build itself lives in the reusable trusted builder
#   build-reusable.yml; this workflow only dispatches it and
#   publishes the finished release bundle.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        type: choice
        default: dry-run
        options:
          - sanity
          - dry-run
          - release

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:

#########################################################
# Build, sign and attest via the reusable trusted builder
#########################################################

  build:
    name: Build
    uses: ./.github/workflows/build-reusable.yml
    # Union grant: a called workflow can only downgrade these permissions,
    # never extend them. id-token/attestations are used ONLY by the isolated
    # `assemble` job inside the trusted builder (build-reusable.yml); every
    # other job in there runs with contents: read (+ actions: read for the
    # SignPath artifact hand-off in build-windows).
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    with:
      mode: ${{ github.event.inputs.mode }}
    secrets:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

#########################################################
# Job for making the release
#########################################################

  release:
    name: Publish release
    if: ${{ github.event.inputs.mode != 'release' || github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: sqlite3mc-release
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      MODE: ${{ github.event.inputs.mode }}

    steps:
      # -------------------------------------------------
      # Checkout repository
      # -------------------------------------------------
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # Create environment variables and display them
      # -------------------------------------------------
      - name: Build context
        uses: ./.github/actions/build-context

      # -------------------------------------------------
      # Download the release bundle assembled, checksummed
      # and attested by the trusted builder
      # -------------------------------------------------
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: release

      # -------------------------------------------------
      # Generate release notes
      # -------------------------------------------------
      - name: Generate release notes
        run: |
          set -euo pipefail
          python scripts/render_template.py \
            packaging/release-notes.md.in \
            release/release-notes.md

      # -------------------------------------------------
      # Mode information
      # -------------------------------------------------
      - name: Release mode info
        run: |
          set -euo pipefail
          echo "=============================="
          echo "MODE: $MODE"
          echo "VERSION: $SQLITE3MC_VERSION"
          echo "=============================="

          case "$MODE" in
            sanity)
              echo "🔎 SANITY CHECK MODE (no side effects)"
              ;;
            dry-run)
              echo "🧪 DRY RUN MODE (signing tested, no release)"
              ;;
            release)
              echo "🚀 REAL RELEASE MODE (will publish)"
              ;;
          esac

      # -------------------------------------------------
      # Sanity mode (no git, no gpg)
      # -------------------------------------------------
      - name: Sanity check environment
        if: ${{ env.MODE == 'sanity' }}
        run: |
          set -euo pipefail
          echo "Checking toolchain only..."
          git --version
          gpg --version
          echo "Sanity check complete."

      # -------------------------------------------------
      # GIT + GPG setup (only non-sanity)
      # -------------------------------------------------
      - name: Set up GPG signing
        if: ${{ env.MODE != 'sanity' }}
        uses: ./.github/actions/setup-signing
        with:
          git-user-name: ${{ vars.GIT_USER_NAME }}
          git-user-email: ${{ vars.GIT_USER_EMAIL }}
          gpg-key-id: ${{ vars.GPG_KEY_ID }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          validate: ${{ env.MODE == 'dry-run' }}

      # -------------------------------------------------
      # Create signed tag for release
      # -------------------------------------------------
      - name: Create signed tag
        if: ${{ env.MODE == 'release' }}
        run: |
          set -euo pipefail
          # Set tag
          TAG="v${SQLITE3MC_VERSION}"

          # Check that tag doesn't exist already
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          # Create annotated and signed tag
          git tag -s "$TAG" -m "based on SQLite3 ${SQLITE_VERSION}"
          git push origin "$TAG"

      # -------------------------------------------------
      # Create GitHub Release
      # -------------------------------------------------
      - name: Create GitHub Release
        if: ${{ env.MODE == 'release' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: "v${{ env.SQLITE3MC_VERSION }}"
          name: "SQLite3 Multiple Ciphers ${{ env.SQLITE3MC_VERSION }} (based on SQLite ${{ env.SQLITE_VERSION }})"
          body_path: release/release-notes.md
          files: |
            release/sqlite3mc-*
