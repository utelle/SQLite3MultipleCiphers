name: Update SQLite (Manual)

on:
  workflow_dispatch:
    inputs:
      sqlite_version:
        description: "SQLite version (e.g. 3.53.1)"
        required: true
      mode:
        description: "Release mode"
        required: true
        type: choice
        default: dry-run
        options:
          - sanity
          - dry-run
          - release

permissions:
  contents: write

env:
  CONFIG_FILE:  config.json
  SQLITE_PATH:  sqlite3
  AMALGAMATION: amalgamation
  ARCHIVES:     archives

jobs:

  generate:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event.inputs.mode }}
#    strategy:
#      fail-fast: false
#      matrix:
#        platform:
#          - win32
#          - win64

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update config
        shell: bash
        run: |
          python scripts/update_config.py "${{ inputs.sqlite_version }}"

      - name: Build context
        shell: bash
        run: |
          python scripts/build_context.py

      - name: Show environment
        shell: bash
        run: |
          echo "SQLite Version:      $SQLITE_VERSION"
          echo "SQLite Version Raw:  $SQLITE_VERSION_RAW"
          echo "SQLite URL Official: $SQLITE_URL_OFFICIAL"
          echo "SQLite URL GitHub:   $SQLITE_URL_GITHUB"

      - name: Download SQLite sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SQLITE_PATH"
          mkdir -p "$AMALGAMATION"
          mkdir -p "$ARCHIVES"

          echo "Downloading from: $SQLITE_URL_OFFICIAL"
          URL="${SQLITE_URL_OFFICIAL}sqlite-amalgamation-${SQLITE_VERSION_RAW}.zip"
          echo "File: $URL"
          curl -L "$URL" -o sqlite.zip

          echo "Extracting..."
          unzip -q sqlite.zip -d "$SQLITE_PATH"

          rm sqlite.zip

          echo "Done. Contents of $SQLITE_PATH:"
          ls -la "$SQLITE_PATH"

      - name: Patch SQLite3 amalgamation
        shell: bash
        run: |
          sqlite3_h="${{ env.SQLITE_PATH }}/sqlite-amalgamation-${{ env.SQLITE_VERSION_RAW }}/sqlite3.h"
          sqlite3ext_h="${{ env.SQLITE_PATH }}/sqlite-amalgamation-${{ env.SQLITE_VERSION_RAW }}/sqlite3ext.h"

          sqlite_src="${{ env.SQLITE_PATH }}/sqlite-amalgamation-${{ env.SQLITE_VERSION_RAW }}/sqlite3.c"
          shell_src="${{ env.SQLITE_PATH }}/sqlite-amalgamation-${{ env.SQLITE_VERSION_RAW }}/shell.c"
          dest_sqlite="${{ env.SQLITE_PATH }}/sqlite3patched.c"
          dest_shell="${{ env.SQLITE_PATH }}/shell.c"
          dest_rekey="${{ env.SQLITE_PATH }}/rekeyvacuum.c"

          chmod +x scripts/patchsqlite3.sh
          chmod +x scripts/patchshell.sh
          chmod +x scripts/rekeyvacuum.sh
          ls -l scripts/

          ./scripts/patchsqlite3.sh $sqlite_src > $dest_sqlite
          ./scripts/patchshell.sh $shell_src > $dest_shell
          ./scripts/rekeyvacuum.sh $sqlite_src > $dest_rekey
          cp "$sqlite_src" "$SQLITE_PATH/"
          cp "$sqlite3_h" "$SQLITE_PATH/"
          cp "$sqlite3ext_h" "$SQLITE_PATH/"
          ls -l "${{ env.SQLITE_PATH }}"

      - name: Comparing patched SQLite files
        shell: bash
        run: |
          set -euo pipefail

          FILES=(
            "sqlite3patched.c"
            "rekeyvacuum.c"
            "shell.c"
          )

          echo "=== Patch comparison report ==="

          CHANGED=0

          for f in "${FILES[@]}"; do
            echo ""
            echo "Checking: $f"

            if cmp -s "src/$f" "$SQLITE_PATH/$f"; then
              echo "OK: identical"
            else
              echo "DIFF: changed"
              CHANGED=1

              echo "--- diff ($f) ---"
              diff -u "src/$f" "$SQLITE_PATH/$f" || true
            fi
          done

          echo ""
          echo "=== Summary ==="

          if [ "$CHANGED" -eq 0 ]; then
            echo "All files identical"
          else
            echo "Some files differ (see above)"
          fi

          exit 0

      - name: Per-file patch impact analysis
        shell: bash
        run: |
          set -euo pipefail

          FILES=(
            "sqlite3patched.c"
            "rekeyvacuum.c"
            "shell.c"
          )

          echo "=== Per-file patch impact ==="

          for f in "${FILES[@]}"; do
            echo ""
            echo "File: $f"

            SRC_FILE="src/$f"
            NEW_FILE="$SQLITE_PATH/$f"

            if [ ! -f "$SRC_FILE" ]; then
              echo "⚠ missing in src: $SRC_FILE"
              continue
            fi

            if [ ! -f "$NEW_FILE" ]; then
              echo "⚠ missing in patched output: $NEW_FILE"
              continue
            fi

            # Determine count of differing lines
            DIFF_LINES=$(diff -u "$SRC_FILE" "$NEW_FILE" | grep -E "^[+-]" | wc -l || true)

            if [ "$DIFF_LINES" -eq 0 ]; then
              echo "OK: identical"
            else
              echo "CHANGED: $DIFF_LINES diff lines"

              echo "--- diff preview ---"
              diff -u "$SRC_FILE" "$NEW_FILE" | sed -n '1,40p' || true
            fi
          done

      - name: Generate amalgamation
        shell: bash
        working-directory: ${{ env.AMALGAMATION }}
        run: |
          python ../scripts/amalgamate.py -v yes -c ../scripts/sqlite3mc.c.json -s ../src
          python ../scripts/amalgamate.py -v yes -c ../scripts/sqlite3mc.h.json -s ../src
          python ../scripts/amalgamate.py -v yes -c ../scripts/shell3mc.c.json  -s ../src
          ls -l
          sed -i 's/[[:space:]]*$//' "sqlite3mc_amalgamation.c"
          sed -i 's/[[:space:]]*$//' "sqlite3mc_amalgamation.h"
          sed -i 's/[[:space:]]*$//' "shell3mc_amalgamation.c"
          ls -l

      - name: Create amalgamation ZIP archive
        shell: bash
        run: |
          set -euo pipefail

          DESTPATH="$ARCHIVES"

          (
            SOURCEPATH="$AMALGAMATION"
            cd "$SOURCEPATH"
            zip -r "../$DESTPATH/amalgamation.zip" .
          )
          (
            SOURCEPATH="$SQLITE_PATH"
            cd "$SOURCEPATH"
            find . -maxdepth 1 -type f -print \
              | zip "../$DESTPATH/sqlite3source.zip" -@
          )

          ls -l "$DESTPATH"

      - name: Upload amalgamation
        uses: actions/upload-artifact@v7
        with:
          name: amalgamation
          path: |
            ${{ env.ARCHIVES }}/amalgamation.zip
            ${{ env.ARCHIVES }}/sqlite3source.zip

      - name: Copy original and patched files into src
        shell: bash
        run: |
          set -euo pipefail

          echo "Copying files into src/ ..."
          for f in sqlite3.c sqlite3.h sqlite3ext.c sqlite3patched.c rekeyvacuum.c shell.c; do
            echo "Copying $f"
            cp -f "$SQLITE_PATH/$f" src/
          done

          echo "Done. Checking for changes..."

          git status --porcelain

      # -------------------------------------------------
      # GIT + GPG SETUP (only non-sanity)
      # -------------------------------------------------
      - name: Configure Git
        if: ${{ inputs.mode != 'sanity' }}
        run: |
          git config user.name "${{ vars.GIT_USER_NAME }}"
          git config user.email "${{ vars.GIT_USER_EMAIL }}"
          git config user.signingkey "${{ vars.GPG_KEY_ID }}"
          git config commit.gpgsign true

      - name: Import GPG key
        if: ${{ inputs.mode != 'sanity' }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      # -------------------------------------------------
      # DRY RUN VALIDATION
      # -------------------------------------------------
      - name: Dry-run signing validation
        if: ${{ inputs.mode == 'dry-run' }}
        run: |
          echo "Testing GPG setup..."
          gpg --list-secret-keys --keyid-format=long

          echo "Testing commit signing..."
          git commit --allow-empty -S -m "dry-run signing test"

          echo "Verifying signature..."
          git log -1 --show-signature

      - name: Commit config changes
        if: ${{ inputs.mode == 'release' }}
        shell: bash
        run: |
          git add config.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update SQLite version to ${{ inputs.sqlite_version }}"
          git push
