name: Download and patch SQLite (Manual)

on:
  workflow_dispatch:
    inputs:
      sqlite_version:
        description: "SQLite version (e.g. 3.53.1)"
        required: true
      mode:
        description: "Release mode"
        required: true
        type: choice
        default: dry-run
        options:
          - sanity
          - dry-run
          - release

permissions:
  contents: write

env:
  CONFIG_FILE:  config.json
  SQLITE_PATH:  sqlite3
  AMALGAMATION: amalgamation
  ARCHIVES:     archives
  LIBICU_PATH:  icu_precompiled

jobs:

  generate:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event.inputs.mode }}
#    strategy:
#      fail-fast: false
#      matrix:
#        platform:
#          - win32
#          - win64

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update config
        shell: bash
        run: |
          python scripts/update_config.py "${{ inputs.sqlite_version }}"

      - name: Build context
        shell: bash
        run: |
          python scripts/build_context.py

      - name: Show environment
        shell: bash
        run: |
          echo "SQLite Version:      $SQLITE_VERSION"
          echo "SQLite Version Raw:  $SQLITE_VERSION_RAW"
          echo "SQLite URL Official: $SQLITE_URL_OFFICIAL"
          echo "SQLite URL GitHub:   $SQLITE_URL_GITHUB"

      - name: Download SQLite sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SQLITE_PATH"

          echo "Downloading from: $SQLITE_URL_OFFICIAL"
          URL="${SQLITE_URL_OFFICIAL}sqlite-amalgamation-${SQLITE_VERSION_RAW}.zip"
          echo "File: $URL"
          curl -L "$URL" -o sqlite.zip

          echo "Extracting..."
          unzip -q sqlite.zip -d "$SQLITE_PATH"

          rm sqlite.zip

          echo "Done. Contents:"
          ls -la "$SQLITE_PATH"

